<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/index-2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    
      <div class="group relative h-96 w-72 [perspective:1000px]">
        <div class="absolute duration-1000 w-full h-full [transform-style:preserve-3d]"id="card">
         <div class="absolute w-full h-full rounded-xl bg-gradient-to-br from-violet-400 to-indigo-600 p-6 text-white [backface-visibility:hidden]">
           <div class="flex flex-col h-full">
             <div class="flex justify-between items-start">
              <div class="text-3xl font-bold" id="title"></div>
                <div class="text-5xl">🌟</div>
             </div>
             <div class="mt-4">
               <p class="text-lg" id="description">

               </p>
        </div>
        <div class="mt-auto">
          <p class="text-sm opacity-75">click to flip!</p>
        </div>
      </div>
    </div>

    <div
      class="absolute w-full h-full rounded-xl bg-gradient-to-br from-pink-400 to-purple-600 p-6 text-white [transform:rotateX(180deg)] [backface-visibility:hidden]"
    >
      <div class="flex flex-col h-full">
        <div class="text-2xl font-bold mb-4" id="name"></div>
        <div class="flex-grow">
          <p class="text-lg" id="uid">
            
          </p>
        </div>
        <div class="flex justify-between items-center mt-auto">
          <button id="editBtn"
            class="px-4 py-2 bg-white text-purple-600 rounded-lg font-semibold hover:bg-opacity-90 transition-colors"
          >
            Edit
          </button>
          <button id="deleteBtn"
            class="px-4 py-2 bg-white text-purple-600 rounded-lg font-semibold hover:bg-opacity-90 transition-colors"
          >
            Delete
          </button>
          <span class="text-3xl">✨</span>
        </div>
      </div>
    </div>
  </div>
</div>

    
     
    <script src="js/index-2.js"></script>
    <script src="js/v_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
