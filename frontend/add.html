<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD Data</title>
    <style>
        @media (max-width: 768px) {
    
    .form-container{
        width: 100%;
        height: 500px;
        transform: translateY(-15%);
        
    }
    
}
    </style>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    

    <!-- From Uiverse.io by omriluz --> 
   <div class="form-container">
      <form class="form" method="post" action="/add">
        <div class="form-group">
          <label for="id">uid</label>
          <input min="0" max="9999" required="" name="uid" id="id" type="number">
        </div>
        <div class="form-group">
          <label for="name">Name</label>
          <input required="" name="name" id="name" type="text">
        </div>
        <div class="form-group">
          <label for="name">Topic</label>
          <input required="" name="title" id="title" type="text">
        </div>
        <div class="form-group txt_area">
          <label for="textarea">Thoughts</label>
          <textarea required="" maxlength="255" cols="50" rows="10" id="textarea" name="textarea"></textarea>
          <p id="max"></p>
        </div>
        <button type="submit" class="form-submit-btn">Submit</button>
      </form>
    </div>
      
    <script src="js/add.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
